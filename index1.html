<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tham Gia Sự Kiện</title>
</head>
<body>
<style>
    h1{
        text-align: center;
        font-size: 60px;
        color: rgb(176, 51, 10);
    }   
</style>
        <h1>Đăng Ký Tham Gia Sự Kiện</h1>
    <form >
        <label for="ten">Nhap Ten:</label>
        <input type="text" id="ten" placeholder="Ho va Ten" >
        <br><br>

        <label for="email">Nhap Email:</label>
        <input type="email" id="email" placeholder="Email" >
        <br><br>

        <label for="">Thời Gian:</label>
        <input type="time">
        <br><br>

        <label for="">Giới Tính:</label>
        <input type="radio" name="gioitinh">Nam
        <input type="radio" name="gioitinh">Nữ
        <br><br>

        <label for="">Sở Thích:</label>
        <input type="checkbox" name="Boi">Bơi
        <input type="checkbox" name="Da Banh">Đá Banh
        <input type="checkbox" name="Danh Bong">Đánh Bóng
        <br><br>

        <input type="submit" value="Xác Nhận">
        <input type="reset" value="Nhập Lại">
    </form>
</body>
</html>
